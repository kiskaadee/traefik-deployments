services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.postgres.rule=HostSNI(`${POSTGRES_DOMAIN}`)"
      - "traefik.tcp.routers.postgres.entrypoints=websecure"
      - "traefik.tcp.routers.postgres.tls=true"
      - "traefik.tcp.routers.postgres.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.tcp.routers.postgres.service=postgres-svc"
      - "traefik.tcp.services.postgres-svc.loadbalancer.server.port=5432"

volumes:
  postgres_data:

networks:
  proxy:
    name: ${PROXY_NETWORK}
    external: true
